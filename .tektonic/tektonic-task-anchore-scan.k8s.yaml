apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-anchore-scan
  namespace: tektonic-ci
spec:
  params:
    - name: ref
      type: string
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: restore-grype-db-cache
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] restore-grype-db-cache: ($msg)"
        }

        let hash = ("" | hash sha256 | str substring 0..15)
        $hash | save -f /tekton/home/.cache-grype-db-hash

        let token_resp = (try {
          http get "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" -H [Metadata-Flavor Google]
        } catch { |e|
          log $"ERROR: failed to fetch Workload Identity token: ($e.msg)"
          exit 1
        })
        let token = ($token_resp | get access_token)
        let token_ttl = ($token_resp | get expires_in)
        log $"token ok, expires in ($token_ttl)s"

        let object = $"grype/($hash).tar.zst"
        let meta_url = $"https://storage.googleapis.com/storage/v1/b/tektonic-ci-cache/o/($object | str replace --all '/' '%2F')"
        log $"checking gs://tektonic-ci-cache/($object)"
        log $"  url: ($meta_url)"

        let metadata = (try {
          http get $meta_url -H [Authorization $"Bearer ($token)"]
        } catch { |e|
          log $"  miss: ($e.msg)"
          null
        })

        if $metadata != null {
          let archive_size = ($metadata.size | into int)
          log $"hit ($hash) size=(($archive_size / 1_000_000) | math round --precision 1)MB"
          let cache_paths = ["grype-db"]
          for p in $cache_paths {
            if ($p | path exists) { ^chmod -R u+w $p; rm -rf $p }
          }
          log "downloading ..."
          let t0 = (date now)
          let dl_url = $"($meta_url)?alt=media"
          http get $dl_url -H [Authorization $"Bearer ($token)"] --raw | ^zstd -d -T0 -c | ^tar xf - -o --no-same-permissions
          let elapsed = (((date now) - $t0) | into int) / 1_000_000_000
          let speed = (if $elapsed > 0 { ($archive_size / 1_000_000) / $elapsed | math round --precision 1 } else { 0 })
          log $"restored in ($elapsed)s ($speed) MB/s"
        } else {
          log $"miss ($hash) — object not found in bucket"
        }
      workingDir: $(workspaces.workspace.path)
    - image: ghcr.io/pfenerty/apko-cicd/syft:1.42.3
      name: generate-sbom
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] generate-sbom: ($msg)"
        }

        log "generating SBOM from package-lock.json"
        let start = (date now)

        ^syft file:package-lock.json -o cyclonedx-json=sbom.cyclonedx.json -o syft-table

        let elapsed = ((date now) - $start | into int) / 1_000_000_000
        log $"done in ($elapsed)s"

        if ("sbom.cyclonedx.json" | path exists) {
          let size = (ls sbom.cyclonedx.json | get size.0)
          log $"sbom size: ($size)"
        } else {
          log "warning: sbom.cyclonedx.json not found"
        }
    - env:
        - name: GRYPE_DB_CACHE_DIR
          value: $(workspaces.workspace.path)/grype-db
      image: ghcr.io/pfenerty/apko-cicd/grype:0.110.0
      name: scan
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] grype-scan: ($msg)"
        }

        log "scanning sbom.cyclonedx.json for vulnerabilities"
        let start = (date now)

        # Run grype directly so stdout/stderr stream in real time.
        # onError: continue prevents the step failure from stopping the pipeline;
        # the exit code is captured by the upload-sarif step via /tekton/steps/step-scan/exitCode.
        ^grype -v sbom:./sbom.cyclonedx.json -o sarif=./scan.sarif

        let elapsed = ((date now) - $start | into int) / 1_000_000_000
        log $"done in ($elapsed)s"

        if ("scan.sarif" | path exists) {
          let size = (ls scan.sarif | get size.0)
          log $"sarif size: ($size)"
        }
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: upload-sarif
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] upload-sarif: ($msg)"
        }

        # Capture grype exit code for status reporting
        let grype_ec = (try { open --raw /tekton/steps/step-scan/exitCode | str trim | into int } catch { 0 })
        $grype_ec | into string | save -f /tekton/home/.exit-code
        log $"grype exit-code: ($grype_ec)"

        if not ("scan.sarif" | path exists) or (ls scan.sarif | get size.0) == 0B {
          log "no sarif to upload, skipping"
          exit 0
        }

        let ref_raw = "$(params.ref)"
        let ref = if ($ref_raw | str starts-with "refs/") { $ref_raw } else { $"refs/heads/($ref_raw)" }
        log $"ref: ($ref)"

        # Base64-encode the gzipped SARIF
        let sarif_b64 = (open --raw scan.sarif | ^gzip -c | encode base64)
        log $"sarif payload: (($sarif_b64 | str length) / 1024 | math round)KB base64"

        let url = "https://api.github.com/repos/$(params.repo-full-name)/code-scanning/sarifs"
        let body = {
          commit_sha: "$(params.revision)",
          ref: $ref,
          sarif: $sarif_b64,
        }

        log $"POST ($url)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "uploaded"
        } catch { |e|
          log $"upload failed: ($e.msg)"
        }
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: save-grype-db-cache
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] save-grype-db-cache: ($msg)"
        }

        let hash = (try { open --raw /tekton/home/.cache-grype-db-hash | str trim } catch { "" })
        if ($hash | is-empty) { log "no hash, skipping"; exit 0 }

        let token = (try {
          http get "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" -H [Metadata-Flavor Google] | get access_token
        } catch { |e|
          log $"ERROR: failed to fetch Workload Identity token: ($e.msg)"
          exit 1
        })

        let object = $"grype/($hash).tar.zst"

        let paths = ["grype-db"] | where { |p| ($p | path exists) }
        if ($paths | is-empty) { log "no paths to cache"; exit 0 }

        for p in $paths { ^chmod -R u+w $p }

        let max = 1
        if $max > 0 {
          let list_url = $"https://storage.googleapis.com/storage/v1/b/tektonic-ci-cache/o?prefix=($"grype/" | str replace --all '/' '%2F')"
          let entries = (try {
            http get $list_url -H [Authorization $"Bearer ($token)"]
            | get items? | default []
            | where { |e| ($e.name | str ends-with ".tar.zst") }
            | sort-by timeCreated | reverse | skip $max
          } catch { [] })
          for e in $entries {
            let del_url = $"https://storage.googleapis.com/storage/v1/b/tektonic-ci-cache/o/($e.name | str replace --all '/' '%2F')"
            try { http delete $del_url -H [Authorization $"Bearer ($token)"] }
            log $"evicted ($e.name)"
          }
        }

        let uncompressed = ($paths | each { |p| try { du $p | get apparent.0 | into int } catch { 0 } } | math sum)
        log $"compressing (($uncompressed / 1_000_000) | math round --precision 1)MB ..."
        let tmp = $"/tmp/cache-($hash).tar.zst"
        let t0 = (date now)
        ^tar cf - ...$paths | ^zstd -3 -T0 -f -o $tmp
        let compress_elapsed = (((date now) - $t0) | into int) / 1_000_000_000
        let compressed = (ls $tmp | get size.0 | into int)
        let ratio = (if $compressed > 0 { $uncompressed / $compressed | math round --precision 1 } else { 0 })
        log $"compressed to (($compressed / 1_000_000) | math round --precision 1)MB ratio=($ratio)x in ($compress_elapsed)s"

        log "uploading ..."
        let upload_url = $"https://storage.googleapis.com/upload/storage/v1/b/tektonic-ci-cache/o?uploadType=media&name=($object | str replace --all '/' '%2F')"
        let t1 = (date now)
        open --raw $tmp | http post $upload_url -H [Authorization $"Bearer ($token)"] -t "application/octet-stream"
        let upload_elapsed = (((date now) - $t1) | into int) / 1_000_000_000
        let speed = (if $upload_elapsed > 0 { ($compressed / 1_000_000) / $upload_elapsed | math round --precision 1 } else { 0 })
        rm $tmp
        log $"uploaded gs://tektonic-ci-cache/($object) in ($upload_elapsed)s ($speed) MB/s"
      workingDir: $(workspaces.workspace.path)
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] report-status [anchore-scan]: ($msg)"
        }

        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "anchore-scan", description: $desc }

        log $"POST ($url)"
        log $"body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "done"
        } catch { |e|
          log $"error: ($e.msg)"
        }
  workspaces:
    - name: workspace
