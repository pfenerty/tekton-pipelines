apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-set-status-pending
  namespace: tektonic-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  steps:
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: pending-test-npm
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] status-pending [test-npm]: ($msg)"
        }

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: "pending", context: "test-npm", description: "Running" }

        log $"POST ($url)"
        log $"body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "done"
        } catch { |e|
          log $"error: ($e.msg)"
          exit 1
        }
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: pending-anchore-scan
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] status-pending [anchore-scan]: ($msg)"
        }

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: "pending", context: "anchore-scan", description: "Running" }

        log $"POST ($url)"
        log $"body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "done"
        } catch { |e|
          log $"error: ($e.msg)"
          exit 1
        }
