apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-cache-save-npm-cache-test-npm
  namespace: tektonic-ci
spec:
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: cache-save-npm-cache
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] cache-save-npm-cache: ($msg)"
        }

        let hash = (try { open --raw $(workspaces.npm-cache.path)/.cache-hash-test-npm | str trim } catch { "" })
        if ($hash | is-empty) { log "no hash, skipping"; exit 0 }

        let archive = $"$(workspaces.npm-cache.path)/($hash).tar.zst"
        if ($archive | path exists) { log $"($hash) exists, skipping"; exit 0 }

        let paths = ["node_modules"] | where { |p| ($p | path exists) }
        if ($paths | is-empty) { log "no paths to cache"; exit 0 }

        # Evict old entries
        let max = 3
        if $max > 0 {
          let entries = (try { ls $(workspaces.npm-cache.path)/*.tar.zst | sort-by modified | reverse | skip $max } catch { [] })
          for e in $entries { log $"evicting ($e.name | path basename)"; rm $e.name }
        }

        log $"saving ($hash) ..."
        ^tar cf - ...$paths | ^zstd -1 -T1 -o $archive

        let size = (ls $archive | get size.0)
        log $"saved archive=($archive) size=($size)"
      workingDir: $(workspaces.workspace.path)
  workspaces:
    - name: npm-cache
    - name: workspace
