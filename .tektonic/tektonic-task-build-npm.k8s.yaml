apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-build-npm
  namespace: tektonic-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: cache-restore-npm-cache
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] cache-restore-npm-cache: ($msg)"
        }

        let hash = (
          ["package-lock.json"]
          | each { |f| if ($f | path exists) { open --raw $f } else { "" } }
          | str join | hash sha256 | str substring 0..15
        )
        $hash | save -f /tekton/home/.cache-npm-cache-hash
        let archive = $"$(workspaces.npm-cache.path)/($hash).tar.zst"

        if ($archive | path exists) {
          let size = (ls $archive | get size.0)
          log $"hit ($hash) archive=($archive) size=($size)"
          ^zstd -d -T1 -c $archive | ^tar xf -
          log "restored"
        } else {
          log $"miss ($hash) archive=($archive)"
        }
      workingDir: $(workspaces.workspace.path)
    - env:
        - name: npm_config_cache
          value: $(workspaces.npm-cache.path)
      image: ghcr.io/pfenerty/apko-cicd/nodejs:22
      name: build
      onError: continue
      script: |-
        #!/bin/sh
        [ ! -d node_modules ] && npm ci
        npm run build; EC=$?; echo $EC > /tekton/home/.exit-code; exit $EC
      workingDir: $(workspaces.workspace.path)
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: cache-save-npm-cache
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] cache-save-npm-cache: ($msg)"
        }

        let hash = (try { open --raw /tekton/home/.cache-npm-cache-hash | str trim } catch { "" })
        if ($hash | is-empty) { log "no hash, skipping"; exit 0 }

        let archive = $"$(workspaces.npm-cache.path)/($hash).tar.zst"
        if ($archive | path exists) { log $"($hash) exists, skipping"; exit 0 }

        let paths = ["node_modules"] | where { |p| ($p | path exists) }
        if ($paths | is-empty) { log "no paths to cache"; exit 0 }

        # Evict old entries
        let max = 3
        if $max > 0 {
          let entries = (try { ls $(workspaces.npm-cache.path)/*.tar.zst | sort-by modified | reverse | skip $max } catch { [] })
          for e in $entries { log $"evicting ($e.name | path basename)"; rm $e.name }
        }

        log $"saving ($hash) ..."
        ^tar cf - ...$paths | ^zstd -1 -T1 -o $archive

        let size = (ls $archive | get size.0)
        log $"saved archive=($archive) size=($size)"
      workingDir: $(workspaces.workspace.path)
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] report-status [build-npm]: ($msg)"
        }

        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "build-npm", description: $desc }

        log $"POST ($url)"
        log $"body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "done"
        } catch { |e|
          log $"error: ($e.msg)"
        }
  workspaces:
    - name: npm-cache
    - name: workspace
